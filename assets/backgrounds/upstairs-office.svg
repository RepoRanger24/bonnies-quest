<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cinematic realistic upstairs antique shop office with rain window, carved desk, portrait, safe, books, lamplight, wood grain, dust, and polished floor reflections">
  <defs>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".78" numOctaves="5" seed="59"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .17"/></feComponentTransfer></filter>
    <filter id="blur"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="dust"><feTurbulence type="fractalNoise" baseFrequency=".013 .038" numOctaves="3" seed="71"/><feColorMatrix type="matrix" values="1 0 0 0 0.9  0 1 0 0 0.76  0 0 1 0 0.5  0 0 0 .14 0"/></filter>
    <linearGradient id="wall" y1="0" y2="1"><stop stop-color="#735038"/><stop offset=".42" stop-color="#372116"/><stop offset=".58" stop-color="#140907"/><stop offset="1" stop-color="#684229"/></linearGradient>
    <linearGradient id="floor" x1="0" x2="1"><stop stop-color="#23110a"/><stop offset=".22" stop-color="#5a321e"/><stop offset=".52" stop-color="#9a6339"/><stop offset=".76" stop-color="#4c2918"/><stop offset="1" stop-color="#180a05"/></linearGradient>
