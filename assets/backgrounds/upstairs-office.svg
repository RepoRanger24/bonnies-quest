    <linearGradient id="window" y1="0" y2="1"><stop stop-color="#324656"/><stop offset=".72" stop-color="#131e26"/><stop offset="1" stop-color="#07090b"/></linearGradient>
    <radialGradient id="lampglow" cx="54%" cy="45%" r="66%"><stop stop-color="#ffefb6" stop-opacity=".72"/><stop offset=".28" stop-color="#d18b3a" stop-opacity=".28"/><stop offset="1" stop-color="#000" stop-opacity=".58"/></radialGradient>
    <radialGradient id="vignette" cx="50%" cy="48%" r="70%"><stop stop-color="#000" stop-opacity="0"/><stop offset=".67" stop-color="#000" stop-opacity=".27"/><stop offset="1" stop-color="#000" stop-opacity=".8"/></radialGradient>
    <pattern id="boards" width="150" height="720" patternUnits="userSpaceOnUse"><path d="M0 430v290M72 430v290M149 430v290" stroke="#100603" stroke-width="4" opacity=".42"/><path d="M13 514c42-17 78-12 125 5M18 620c34 15 76 11 118-7M10 684c50-11 88-6 128 6" fill="none" stroke="#d5a06a" stroke-width="2" opacity=".18"/></pattern>
