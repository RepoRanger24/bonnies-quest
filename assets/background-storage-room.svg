<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cinematic realistic antique shop storage room with packed wood shelving, crates, stairwell, rain window, dust, and warm amber shadows">
