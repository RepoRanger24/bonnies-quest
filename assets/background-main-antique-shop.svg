<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cinematic realistic antique shop interior at night with rain-streaked window, brass lamp glow, carved counter, shelves, framed art, and polished floor reflections">
  <defs>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="4" seed="91"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .14"/></feComponentTransfer></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="paint"><feTurbulence type="fractalNoise" baseFrequency=".022" numOctaves="3" seed="12" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.4"/></filter>
    <filter id="dust"><feTurbulence type="fractalNoise" baseFrequency=".011 .034" numOctaves="3" seed="77"/><feColorMatrix type="matrix" values="1 0 0 0 0.96  0 1 0 0 0.78  0 0 1 0 0.52  0 0 0 .13 0"/></filter>
    <linearGradient id="wall" y1="0" y2="1"><stop stop-color="#514033"/><stop offset=".48" stop-color="#2b1b14"/><stop offset=".63" stop-color="#130b08"/><stop offset="1" stop-color="#4a2b1a"/></linearGradient>
    <linearGradient id="floor" x1="0" x2="1"><stop stop-color="#170b06"/><stop offset=".18" stop-color="#3d2114"/><stop offset=".44" stop-color="#7d5130"/><stop offset=".72" stop-color="#402214"/><stop offset="1" stop-color="#120805"/></linearGradient>
    <linearGradient id="wood" x1="0" x2="1"><stop stop-color="#150804"/><stop offset=".22" stop-color="#59301c"/><stop offset=".48" stop-color="#9b6438"/><stop offset=".72" stop-color="#4a2616"/><stop offset="1" stop-color="#0d0503"/></linearGradient>
    <linearGradient id="brass" x1="0" x2="1"><stop stop-color="#4b2c0e"/><stop offset=".36" stop-color="#e0ad56"/><stop offset=".62" stop-color="#8d5b20"/><stop offset="1" stop-color="#f2d58b"/></linearGradient>
    <radialGradient id="lampGlow" cx="39%" cy="47%" r="55%"><stop stop-color="#ffe8ad" stop-opacity=".66"/><stop offset=".2" stop-color="#e5a64b" stop-opacity=".34"/><stop offset=".52" stop-color="#7b3f1d" stop-opacity=".14"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient>
    <radialGradient id="windowGlow" cx="14%" cy="32%" r="40%"><stop stop-color="#cbd9df" stop-opacity=".42"/><stop offset=".42" stop-color="#28404b" stop-opacity=".28"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient>
    <radialGradient id="vignette" cx="52%" cy="48%" r="72%"><stop stop-color="#000" stop-opacity="0"/><stop offset=".68" stop-color="#000" stop-opacity=".28"/><stop offset="1" stop-color="#000" stop-opacity=".82"/></radialGradient>
    <pattern id="floorboards" width="150" height="760" patternUnits="userSpaceOnUse"><path d="M0 472v288M72 472v288M149 472v288" stroke="#100603" stroke-width="4" opacity=".44"/><path d="M12 526c48-16 84-12 126 6M18 626c38 13 78 9 116-7M8 704c46-10 92-6 132 8" fill="none" stroke="#d09a63" stroke-width="2" opacity=".18"/></pattern>
  </defs>
  <rect width="1280" height="760" fill="url(#wall)"/>
  <path d="M0 472h1280v288H0z" fill="url(#floor)"/>
  <rect width="1280" height="760" fill="url(#floorboards)" opacity=".9"/>
  <g opacity=".28" stroke="#0d0503" stroke-width="4"><path d="M0 506c174-31 343-28 542 8 244 45 449 33 738-23"/><path d="M0 578c226-35 404-20 624 16 239 38 430 19 656-22"/><path d="M0 656c229-30 431-22 630 10 244 39 421 28 650-25"/></g>
  <path d="M0 472h1280" stroke="#080302" stroke-width="19"/>

  <!-- Rain window and cold exterior bounce light. -->
  <g transform="translate(70 168)">
    <rect x="0" y="0" width="154" height="196" rx="5" fill="#071015" stroke="#140905" stroke-width="13"/>
    <g stroke="#1b0c07" stroke-width="9"><path d="M77 0v196"/><path d="M0 96h154"/></g>
    <rect x="8" y="8" width="138" height="180" fill="#1f3440" opacity=".68"/>
    <g stroke="#b8d6df" stroke-width="3" opacity=".46" stroke-linecap="round"><path d="M24 12l-9 82"/><path d="M61 20l-16 140"/><path d="M95 5L83 111"/><path d="M130 27l-11 132"/><path d="M38 99l-7 82"/><path d="M111 112l-9 70"/></g>
    <path d="M8 8h138v180" fill="none" stroke="#dcebf0" stroke-width="3" opacity=".25"/>
  </g>
  <rect width="1280" height="760" fill="url(#windowGlow)"/>

