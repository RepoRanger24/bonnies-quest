<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Realistic semi-painted Bonnie adventure game character in warm lamplight">
  <defs>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".78" numOctaves="3" seed="47"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .08"/></feComponentTransfer></filter>
    <linearGradient id="skin" x1="0" x2="1"><stop stop-color="#8b523e"/><stop offset=".28" stop-color="#d99c78"/><stop offset=".52" stop-color="#f0bf9a"/><stop offset=".74" stop-color="#b46d52"/><stop offset="1" stop-color="#5b3028"/></linearGradient>
    <radialGradient id="hair" cx="44%" cy="22%" r="72%"><stop stop-color="#765441"/><stop offset=".34" stop-color="#38231d"/><stop offset="1" stop-color="#110b09"/></radialGradient>
